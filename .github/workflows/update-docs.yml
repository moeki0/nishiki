name: Update README on gengen changes

on:
  push:
    branches:
      - main
    paths:
      - 'packages/gengen/src/**'

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            packages/gengen の src/ に変更がありました。
            以下の手順でREADMEを更新してください：

            1. `git diff HEAD~1 -- packages/gengen/src/` で変更内容を確認する
            2. `packages/gengen/README.md` を読む
            3. 変更内容に応じてREADMEを更新する（新しいAPI・変更されたAPI・削除されたAPIを反映）
            4. 変更があれば `git add packages/gengen/README.md` してコミットする
               コミットメッセージは `docs: update README for gengen changes` とする
            5. `git push` する

            注意：
            - READMEに実際に反映すべき変更がない場合はコミットしない
            - 既存のドキュメントスタイルを維持する
          allowed_tools: "Bash(git diff *),Bash(git log *),Bash(git add *),Bash(git commit *),Bash(git push *),Read,Edit"
